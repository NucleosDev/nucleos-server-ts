$kind: http-example
request:
  url: https://api.getpostman.com/collections/12ece9e1-2abf-4edc-8e34-de66e74114d2
  method: PUT
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "collection": {
              "info": {
                  "name": "Test Collection"
              }
          }
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "error": {
              "name": "malformedRequestError",
              "message": "Found 2 errors with the supplied collection.",
              "details": [
                  ": must have required property 'item'",
                  "info: must have required property 'schema'"
              ]
          }
      }
order: 4000
