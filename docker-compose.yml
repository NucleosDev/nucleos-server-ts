services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nucleos-api

    ports:
      - "7000:7000"
      - "9229:9229"

    environment:
      NODE_ENV: development
      NODE_OPTIONS: --dns-result-order=ipv4first
      PORT: 7000
      API_VERSION: v1
      REDIS_URL: redis://redis:6379
      DATABASE_URL: ${DATABASE_URL}
      JWT_KEY: ${JWT_KEY}
      JWT_ISSUER: ${JWT_ISSUER:-http://localhost:7000}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}

    volumes:
      - .:/app
      - /app/node_modules
      - logs:/app/logs
      - uploads:/app/uploads

    command: node --dns-result-order=ipv4first node_modules/.bin/tsx watch src/api/server.ts

    depends_on:
      redis:
        condition: service_healthy

    networks:
      - nucleos-network

    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nucleos-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nucleos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

networks:
  nucleos-network:
    driver: bridge

volumes:
  logs:
  uploads:
  redis-data:
