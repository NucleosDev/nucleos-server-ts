services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nucleos-api

    ports:
      - "5000:5000"
      - "9229:9229"

    environment:
      NODE_ENV: development
      PORT: 5000
      API_VERSION: v1
      REDIS_URL: redis://redis:6379
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}

    volumes:
      - .:/app
      - /app/node_modules
      - logs:/app/logs
      - uploads:/app/uploads

    command: npm run dev

    networks:
      - nucleos-network

    restart: unless-stopped

networks:
  nucleos-network:
    driver: bridge

volumes:
  logs:
  uploads: