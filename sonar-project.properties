# ==============================================================
# SonarQube — Nucleos Backend
# Disciplina: QSS / Qualidade e Segurança de Software
# ==============================================================

sonar.projectKey=nucleos-backend
sonar.projectName=Nucleos Backend
sonar.projectVersion=1.0.0

# Código-fonte
sonar.sources=src
sonar.exclusions=src/__test__/**,src/**/*.spec.ts,src/**/*.test.ts,dist/**,node_modules/**

# Testes
sonar.tests=src/__test__
sonar.test.inclusions=src/**/*.spec.ts,src/**/*.test.ts

# Cobertura de testes (gerada via jest --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/__test__/**,src/infrastructure/persistence/migrations/**

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8

# Servidor local (padrão docker-compose.sonar.yml)
sonar.host.url=http://localhost:9000

# Token: gerado no painel do SonarQube em
#   User > My Account > Security > Generate Tokens
# Passe via variável de ambiente para não commitar:
#   SONAR_TOKEN=<seu_token> npm run sonar
sonar.token=${SONAR_TOKEN}
