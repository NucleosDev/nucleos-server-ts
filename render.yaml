services:
  - type: web
    name: nucleos-backend
    runtime: node
    region: oregon
    plan: starter
    buildCommand: rm -rf node_modules && npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: API_VERSION
        value: v1
      - key: CORS_ORIGINS
        value: "https://www.nucleos.space,https://nucleos.space,http://localhost:3000"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_HOST
        sync: false
      - key: SUPABASE_PORT
        value: 6543
      - key: SUPABASE_DATABASE
        sync: false
      - key: SUPABASE_USERNAME
        sync: false
      - key: SUPABASE_PASSWORD
        sync: false
      - key: JWT_KEY
        generateValue: true
      - key: JWT_ISSUER
        value: "https://api.nucleos.space"
      - key: JWT_AUDIENCE
        value: "https://www.nucleos.space"
      - key: JWT_EXPIRES_MINUTES
        value: 90
      - key: REDIS_URL
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: 6379
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 200
